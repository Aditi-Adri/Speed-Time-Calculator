<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playback Speed Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .input-field {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }
        .speed-btn {
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }
        .speed-btn.active {
            background: #8b5cf6;
            color: white;
            transform: scale(1.05);
        }
        .speed-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-lg rounded-2xl p-8 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-purple-600 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
        <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-blue-600 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>

        <div class="relative z-10">
            <h1 class="text-3xl font-bold text-center mb-2"><i class="fas fa-clock text-purple-400 mr-2"></i>Speed Calculator</h1>
            <p class="text-gray-400 text-center mb-8 text-sm">Calculate actual watch time based on playback speed</p>

            <!-- Time Inputs -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-300 mb-2">Original Duration</label>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <input type="number" id="hours" min="0" placeholder="0" class="input-field w-full rounded-lg px-4 py-3 text-center text-xl font-semibold" oninput="calculateTime()">
                        <div class="text-center text-xs text-gray-400 mt-1">Hours</div>
                    </div>
                    <div>
                        <input type="number" id="minutes" min="0" max="59" placeholder="0" class="input-field w-full rounded-lg px-4 py-3 text-center text-xl font-semibold" oninput="calculateTime()">
                        <div class="text-center text-xs text-gray-400 mt-1">Minutes</div>
                    </div>
                    <div>
                        <input type="number" id="seconds" min="0" max="59" placeholder="0" class="input-field w-full rounded-lg px-4 py-3 text-center text-xl font-semibold" oninput="calculateTime()">
                        <div class="text-center text-xs text-gray-400 mt-1">Seconds</div>
                    </div>
                </div>
            </div>

            <!-- Speed Selection -->
            <div class="mb-8">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-medium text-gray-300">Playback Speed</label>
                    <span id="currentSpeedLabel" class="text-purple-400 font-bold">1.25x</span>
                </div>
                
                <!-- Quick Speed Buttons -->
                <div class="grid grid-cols-4 gap-2 mb-4">
                    <button class="speed-btn rounded-lg py-2 text-sm font-medium" onclick="setSpeed(1.25)">1.25x</button>
                    <button class="speed-btn rounded-lg py-2 text-sm font-medium active" onclick="setSpeed(1.5)">1.5x</button>
                    <button class="speed-btn rounded-lg py-2 text-sm font-medium" onclick="setSpeed(1.75)">1.75x</button>
                    <button class="speed-btn rounded-lg py-2 text-sm font-medium" onclick="setSpeed(2.0)">2.0x</button>
                </div>

                <!-- Custom Speed Slider -->
                <input type="range" id="speedSlider" min="0.5" max="3" step="0.05" value="1.5" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-purple-500" oninput="updateSpeedFromSlider()">
                <div class="flex justify-between text-xs text-gray-500 mt-1">
                    <span>0.5x</span>
                    <span>3.0x</span>
                </div>
            </div>

            <!-- Results -->
            <div class="bg-gray-900 bg-opacity-50 rounded-xl p-5 border border-purple-500/30 relative overflow-hidden group">
                <div class="absolute inset-0 bg-gradient-to-r from-purple-600/10 to-blue-600/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="relative z-10 flex flex-col items-center">
                    <span class="text-sm text-gray-400 mb-1">New Completion Time</span>
                    <div id="resultTime" class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">0h 0m 0s</div>
                    <div id="timeSaved" class="mt-2 text-sm text-green-400 font-medium opacity-0 transition-opacity"><i class="fas fa-bolt mr-1"></i>You save 0 minutes!</div>
                    
                    <div class="w-full h-px bg-gray-700/50 my-4"></div>
                    
                    <div class="flex items-center justify-between w-full text-sm">
                        <span class="text-gray-400"><i class="fas fa-calendar-check mr-2"></i>Finishes at (if started now):</span>
                        <span id="finishTime" class="font-bold text-purple-300">--:--</span>
                    </div>
                </div>
            </div>
            
            <button onclick="clearFields()" class="mt-6 w-full py-3 rounded-lg border border-red-500/30 text-red-400 hover:bg-red-500/10 transition-colors text-sm font-medium">
                <i class="fas fa-trash-alt mr-2"></i>Clear
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
